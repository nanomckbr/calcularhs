<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Horas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen">

  <main class="max-w-md mx-auto p-5">

    <!-- HEADER -->
    <header class="mb-6">
      <h1 class="text-5xl font-bold tracking-tight">
        Control de Horas
      </h1>

      <p class="text-zinc-400 text-lg mt-2">
        Gestión laboral y liquidación mensual
      </p>
    </header>

    <!-- CARD PRINCIPAL -->
    <section class="bg-zinc-900 border border-zinc-800 rounded-[32px] p-5">

      <!-- SEMANA -->
      <div class="flex items-center justify-between mb-5">
        <div>
          <p class="text-zinc-500 text-sm">
            Semana actual
          </p>

          <h2 class="text-2xl font-bold" id="semanaTexto">
            Semana del 11 al 18
          </h2>
        </div>

        <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
      </div>

      <!-- CALENDARIO -->
      <div class="grid grid-cols-7 gap-2 mb-6" id="calendar">
      </div>

      <!-- TURNO -->
      <div class="mb-6">
        <p class="text-zinc-400 mb-3 text-sm uppercase tracking-wide">
          Turno a trabajar
        </p>

        <select
          id="turno"
          class="
            w-full
            bg-zinc-800
            border
            border-zinc-700
            rounded-2xl
            p-4
            text-lg
            outline-none
          "
        >
          <option value="">Seleccionar turno</option>
          <option value="mañana">🌅 Turno Mañana</option>
          <option value="tarde">🌇 Turno Tarde</option>
          <option value="noche">🌙 Turno Noche</option>
        </select>
      </div>

      <!-- BOTON -->
      <button
        id="calcularBtn"
        class="
          w-full
          bg-emerald-500
          hover:bg-emerald-400
          active:scale-[0.98]
          transition
          rounded-2xl
          p-4
          font-bold
          text-lg
          mb-5
        "
      >
        Calcular sueldo
      </button>

      <!-- RESULTADO -->
      <div
        id="resultado"
        class="
          hidden
          bg-zinc-800
          rounded-2xl
          p-5
          border
          border-zinc-700
        "
      >
        <p class="text-zinc-400 text-sm mb-2">
          Sueldo bruto estimado
        </p>

        <h3
          id="sueldo"
          class="text-5xl font-bold text-emerald-400"
        >
          $0
        </h3>

        <div class="mt-5 space-y-2 text-zinc-300">
          <div class="flex justify-between">
            <span>Horas normales</span>
            <span>192h</span>
          </div>

          <div class="flex justify-between">
            <span>Horas nocturnas</span>
            <span>24h</span>
          </div>

          <div class="flex justify-between">
            <span>Horas extra</span>
            <span>10h</span>
          </div>
        </div>
      </div>

    </section>

  </main>

  <script>
    const calendar = document.getElementById("calendar")
    const semanaTexto = document.getElementById("semanaTexto")

    const hoy = new Date()

    const inicioSemana = new Date(hoy)
    inicioSemana.setDate(hoy.getDate() - hoy.getDay() + 1)

    const finSemana = new Date(inicioSemana)
    finSemana.setDate(inicioSemana.getDate() + 6)

    semanaTexto.innerText =
      `Semana del ${inicioSemana.getDate()} al ${finSemana.getDate()}`

    const dias = ["L", "M", "X", "J", "V", "S", "D"]

    dias.forEach((dia) => {
      const label = document.createElement("div")

      label.className =
        "text-center text-zinc-500 text-sm font-medium"

      label.innerText = dia

      calendar.appendChild(label)
    })

    for (let i = 0; i < 7; i++) {
      const fecha = new Date(inicioSemana)
      fecha.setDate(inicioSemana.getDate() + i)

      const day = document.createElement("button")

      const esHoy =
        fecha.toDateString() === hoy.toDateString()

      day.className = `
        aspect-square
        rounded-2xl
        flex
        items-center
        justify-center
        text-lg
        transition
        ${esHoy
          ? "bg-emerald-500 text-black font-bold scale-105"
          : "bg-zinc-800 hover:bg-zinc-700"}
      `

      day.innerText = fecha.getDate()

      calendar.appendChild(day)
    }

    const calcularBtn =
      document.getElementById("calcularBtn")

    const resultado =
      document.getElementById("resultado")

    const sueldo =
      document.getElementById("sueldo")

    calcularBtn.addEventListener("click", () => {
      calcularBtn.innerText = "Calculando..."

      setTimeout(() => {
        resultado.classList.remove("hidden")

        sueldo.innerText = "$1.842.000"

        calcularBtn.innerText = "Calcular sueldo"
      }, 1000)
    })
  </script>

</body>
</html>
