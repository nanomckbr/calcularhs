
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Horas</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #000;
    }

    .fade-in {
      animation: fade .25s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .chip.active {
      background: #10b981;
      color: black;
      border-color: #10b981;
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <main class="max-w-md mx-auto px-4 py-6">

    <!-- HEADER -->
    <header class="mb-6">
      <h1 class="text-4xl font-bold tracking-tight">
        Control de Horas
      </h1>

      <p class="text-zinc-400 mt-1">
        Gestión semanal de turnos
      </p>
    </header>

    <!-- CALENDARIO -->
    <section class="bg-zinc-900 border border-zinc-800 rounded-[30px] p-5 mb-5">

      <div class="flex items-center justify-between mb-5">
        <div>
          <p class="text-zinc-500 text-sm">
            Semana actual
          </p>

          <h2
            id="semanaTexto"
            class="text-2xl font-bold"
          >
            Semana del 11 al 17
          </h2>
        </div>

        <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
      </div>

      <!-- DIAS -->
      <div class="grid grid-cols-7 gap-2 mb-3" id="diasSemana">
      </div>

      <!-- NUMEROS -->
      <div class="grid grid-cols-7 gap-2" id="calendar">
      </div>

    </section>

    <!-- SELECTOR -->
    <section class="bg-zinc-900 border border-zinc-800 rounded-[30px] p-5 mb-5">

      <p class="text-zinc-400 uppercase tracking-wide text-sm mb-4">
        Turno a trabajar
      </p>

      <select
        id="turno"
        class="
          w-full
          bg-zinc-800
          border
          border-zinc-700
          rounded-2xl
          p-4
          text-lg
          outline-none
        "
      >
        <option value="">Seleccionar turno</option>
        <option value="mañana">🌅 Turno Mañana</option>
        <option value="tarde">🌇 Turno Tarde</option>
        <option value="noche">🌙 Turno Noche</option>
      </select>

    </section>

    <!-- VARIABLES -->
    <section
      id="variablesContainer"
      class="
        hidden
        fade-in
        bg-zinc-900
        border
        border-zinc-800
        rounded-[30px]
        p-5
        mb-5
      "
    >

      <div class="flex items-center justify-between mb-5">
        <h3 class="text-2xl font-bold">
          Variables de la semana
        </h3>

        <button
          id="calcularBtn"
          class="
            bg-emerald-500
            hover:bg-emerald-400
            transition
            px-4
            py-2
            rounded-xl
            font-semibold
            text-black
          "
        >
          Calcular sueldo
        </button>
      </div>

      <div id="variablesSemana" class="space-y-5">
      </div>

    </section>

    <!-- RESULTADO -->
    <section
      id="resultado"
      class="
        hidden
        fade-in
        bg-zinc-900
        border
        border-zinc-800
        rounded-[30px]
        p-5
      "
    >

      <p class="text-zinc-400 text-sm mb-2">
        Sueldo bruto estimado
      </p>

      <h2
        id="sueldo"
        class="text-5xl font-bold text-emerald-400"
      >
        $1.842.000
      </h2>

      <div class="mt-6 space-y-3 text-zinc-300">

        <div class="flex justify-between">
          <span>Horas normales</span>
          <span>192h</span>
        </div>

        <div class="flex justify-between">
          <span>Horas nocturnas</span>
          <span>24h</span>
        </div>

        <div class="flex justify-between">
          <span>Horas plus</span>
          <span>16h</span>
        </div>

        <div class="flex justify-between">
          <span>Feriados</span>
          <span>1</span>
        </div>

      </div>

    </section>

  </main>

  <script>

    const diasLabels = ["D", "L", "M", "X", "J", "V", "S"]

    const diasSemana =
      document.getElementById("diasSemana")

    const calendar =
      document.getElementById("calendar")

    const semanaTexto =
      document.getElementById("semanaTexto")

    const hoy = new Date()

    const inicioSemana = new Date(hoy)

    inicioSemana.setDate(
      hoy.getDate() - hoy.getDay()
    )

    const finSemana = new Date(inicioSemana)

    finSemana.setDate(
      inicioSemana.getDate() + 6
    )

    semanaTexto.innerText =
      `Semana del ${inicioSemana.getDate()} al ${finSemana.getDate()}`

    diasLabels.forEach((dia) => {

      const el = document.createElement("div")

      el.className =
        "text-center text-zinc-500 text-sm font-medium"

      el.innerText = dia

      diasSemana.appendChild(el)

    })

    for (let i = 0; i < 7; i++) {

      const fecha = new Date(inicioSemana)

      fecha.setDate(
        inicioSemana.getDate() + i
      )

      const esHoy =
        fecha.toDateString() === hoy.toDateString()

      const btn =
        document.createElement("button")

      btn.className = `
        aspect-square
        rounded-2xl
        transition
        flex
        items-center
        justify-center
        text-lg
        ${esHoy
          ? "bg-emerald-500 text-black font-bold scale-105"
          : "bg-zinc-800 hover:bg-zinc-700"}
      `

      btn.innerText = fecha.getDate()

      calendar.appendChild(btn)
    }

    const turno =
      document.getElementById("turno")

    const variablesContainer =
      document.getElementById("variablesContainer")

    const variablesSemana =
      document.getElementById("variablesSemana")

    turno.addEventListener("change", () => {

      if (!turno.value) {
        variablesContainer.classList.add("hidden")
        return
      }

      variablesContainer.classList.remove("hidden")

      variablesSemana.innerHTML = ""

      for (let i = 0; i < 7; i++) {

        const fecha = new Date(inicioSemana)

        fecha.setDate(
          inicioSemana.getDate() + i
        )

        const dia =
          document.createElement("div")

        dia.className =
          "bg-zinc-800 rounded-2xl p-4"

        dia.innerHTML = `
          <div class="flex items-center justify-between mb-4">

            <div>
              <p class="text-zinc-500 text-sm">
                ${diasLabels[i]}
              </p>

              <h4 class="text-xl font-bold">
                ${fecha.getDate()}
              </h4>
            </div>

            <div class="text-sm text-zinc-400 capitalize">
              ${turno.value}
            </div>

          </div>

          <div class="flex flex-wrap gap-2">

            <button class="chip border border-zinc-700 rounded-full px-3 py-2 text-sm transition">
              ➕ Horas plus
            </button>

            <button class="chip border border-zinc-700 rounded-full px-3 py-2 text-sm transition">
              ⭐ Feriado
            </button>

            <button class="chip border border-zinc-700 rounded-full px-3 py-2 text-sm transition">
              🌙 Nocturnas
            </button>

            <button class="chip border border-zinc-700 rounded-full px-3 py-2 text-sm transition">
              🤒 Enfermedad
            </button>

          </div>
        `

        variablesSemana.appendChild(dia)
      }

      const chips =
        document.querySelectorAll(".chip")

      chips.forEach((chip) => {

        chip.addEventListener("click", () => {

          chip.classList.toggle("active")

        })

      })

    })

    const calcularBtn =
      document.getElementById("calcularBtn")

    const resultado =
      document.getElementById("resultado")

    calcularBtn.addEventListener("click", () => {

      calcularBtn.innerText = "Calculando..."

      setTimeout(() => {

        resultado.classList.remove("hidden")

        calcularBtn.innerText =
          "Calcular sueldo"

      }, 1000)

    })

  </script>

</body>
</html>
