
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control de Horas</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #000;
    }

    .fade-in {
      animation: fade .25s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toggle-active {
      background: #10b981 !important;
      border-color: #10b981 !important;
      color: black !important;
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <main class="max-w-md mx-auto px-4 py-6">

    <header class="mb-6">
      <h1 class="text-4xl font-bold tracking-tight">
        Control de Horas
      </h1>

      <p class="text-zinc-400 mt-1">
        Gestión semanal de turnos
      </p>
    </header>

    <!-- CALENDARIO -->
    <section class="bg-zinc-900 border border-zinc-800 rounded-[30px] p-5 mb-5">

      <div class="flex items-center justify-between mb-5">

        <div>
          <p class="text-zinc-500 text-sm">
            Semana actual
          </p>

          <h2
            id="semanaTexto"
            class="text-2xl font-bold"
          >
            Semana
          </h2>
        </div>

        <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>

      </div>

      <div
        id="diasSemana"
        class="grid grid-cols-7 gap-2 mb-3"
      ></div>

      <div
        id="calendar"
        class="grid grid-cols-7 gap-2"
      ></div>

    </section>

    <!-- TURNO -->
    <section class="bg-zinc-900 border border-zinc-800 rounded-[30px] p-5 mb-5">

      <p class="text-zinc-400 uppercase tracking-wide text-sm mb-4">
        Turno a trabajar
      </p>

      <select
        id="turno"
        class="
          w-full
          bg-zinc-800
          border
          border-zinc-700
          rounded-2xl
          p-4
          text-lg
          outline-none
        "
      >
        <option value="">Seleccionar turno</option>
        <option value="mañana">🌅 Turno Mañana</option>
        <option value="tarde">🌇 Turno Tarde</option>
        <option value="noche">🌙 Turno Noche</option>
      </select>

      <p
        id="infoNocturna"
        class="hidden text-sm text-violet-400 mt-3"
      >
        + adicional nocturno aplicado automáticamente
      </p>

    </section>

    <!-- VARIABLES -->
    <section
      id="variablesContainer"
      class="
        hidden
        fade-in
        bg-zinc-900
        border
        border-zinc-800
        rounded-[30px]
        p-5
        mb-5
      "
    >

      <div class="flex items-center justify-between mb-5">

        <h3 class="text-2xl font-bold">
          Semana laboral
        </h3>

        <button
          id="calcularBtn"
          class="
            bg-emerald-500
            hover:bg-emerald-400
            transition
            px-4
            py-2
            rounded-xl
            font-semibold
            text-black
          "
        >
          Calcular
        </button>

      </div>

      <div
        id="variablesSemana"
        class="space-y-4"
      ></div>

    </section>

    <!-- RESULTADO -->
    <section
      id="resultado"
      class="
        hidden
        fade-in
        bg-zinc-900
        border
        border-zinc-800
        rounded-[30px]
        p-5
      "
    >

      <p class="text-zinc-400 text-sm mb-2">
        Sueldo bruto estimado
      </p>

      <h2 class="text-5xl font-bold text-emerald-400">
        $1.842.000
      </h2>

      <div class="mt-6 space-y-3 text-zinc-300">

        <div class="flex justify-between">
          <span>Horas normales</span>
          <span>192h</span>
        </div>

        <div class="flex justify-between">
          <span>Horas nocturnas</span>
          <span>24h</span>
        </div>

        <div class="flex justify-between">
          <span>Horas plus</span>
          <span>16h</span>
        </div>

        <div class="flex justify-between">
          <span>Horas enfermedad</span>
          <span>8h</span>
        </div>

        <div class="flex justify-between">
          <span>Horas feriado</span>
          <span>8h</span>
        </div>

      </div>

    </section>

  </main>

  <script>

    const turnoSelect =
      document.getElementById("turno")

    const diasSemana =
      document.getElementById("diasSemana")

    const calendar =
      document.getElementById("calendar")

    const semanaTexto =
      document.getElementById("semanaTexto")

    const variablesContainer =
      document.getElementById("variablesContainer")

    const variablesSemana =
      document.getElementById("variablesSemana")

    const infoNocturna =
      document.getElementById("infoNocturna")

    const hoy = new Date()

    function renderSemana(turno) {

      diasSemana.innerHTML = ""
      calendar.innerHTML = ""

      let labels
      let diasTrabajados

      if (turno === "noche") {
        labels = ["D", "L", "M", "X", "J", "V", "S"]
        diasTrabajados = 6
      } else {
        labels = ["L", "M", "X", "J", "V", "S", "D"]
        diasTrabajados = 6
      }

      let inicioSemana = new Date(hoy)

      if (turno === "noche") {

        inicioSemana.setDate(
          hoy.getDate() - hoy.getDay()
        )

      } else {

        const day = hoy.getDay()

        const diff =
          day === 0 ? -6 : 1 - day

        inicioSemana.setDate(
          hoy.getDate() + diff
        )

      }

      const finSemana =
        new Date(inicioSemana)

      finSemana.setDate(
        inicioSemana.getDate() + 6
      )

      semanaTexto.innerText =
        `Semana del ${inicioSemana.getDate()} al ${finSemana.getDate()}`

      labels.forEach((label) => {

        const el =
          document.createElement("div")

        el.className =
          "text-center text-zinc-500 text-sm font-medium"

        el.innerText = label

        diasSemana.appendChild(el)

      })

      for (let i = 0; i < 7; i++) {

        const fecha =
          new Date(inicioSemana)

        fecha.setDate(
          inicioSemana.getDate() + i
        )

        const esHoy =
          fecha.toDateString() === hoy.toDateString()

        const esTrabajado = i < diasTrabajados

        const btn =
          document.createElement("button")

        btn.className = `
          aspect-square
          rounded-2xl
          transition
          flex
          items-center
          justify-center
          text-lg
          ${esHoy
            ? "bg-emerald-500 text-black font-bold scale-105"
            : esTrabajado
              ? "bg-zinc-800 hover:bg-zinc-700"
              : "bg-zinc-950 text-zinc-600 border border-zinc-800"}
        `

        btn.innerText =
          fecha.getDate()

        calendar.appendChild(btn)

      }

      variablesSemana.innerHTML = ""

      for (let i = 0; i < diasTrabajados; i++) {

        const fecha =
          new Date(inicioSemana)

        fecha.setDate(
          inicioSemana.getDate() + i
        )

        const card =
          document.createElement("div")

        card.className =
          "bg-zinc-800 rounded-2xl p-4"

        card.innerHTML = `

          <div class="flex items-center justify-between mb-4">

            <div>
              <p class="text-zinc-500 text-sm">
                ${labels[i]}
              </p>

              <h4 class="text-xl font-bold">
                ${fecha.getDate()}
              </h4>
            </div>

            <div class="
              px-3
              py-1
              rounded-full
              text-sm
              bg-zinc-700
              capitalize
            ">
              ${turno}
            </div>

          </div>

          <button
            class="
              w-full
              bg-zinc-900
              hover:bg-zinc-950
              border
              border-zinc-700
              rounded-xl
              p-3
              transition
              mb-4
              font-medium
            "
          >
            Cargar horas
          </button>

          <div class="space-y-4">

            <div>

              <div class="flex justify-between mb-2">
                <span class="text-sm text-zinc-300">
                  Horas plus
                </span>

                <span class="text-zinc-500 text-sm">
                  h
                </span>
              </div>

              <input
                type="number"
                min="0"
                value="0"
                class="
                  w-full
                  bg-zinc-900
                  border
                  border-zinc-700
                  rounded-xl
                  p-3
                  outline-none
                "
              />

            </div>

            <div>

              <div class="flex justify-between mb-2">
                <span class="text-sm text-zinc-300">
                  Retiro anticipado
                </span>

                <span class="text-zinc-500 text-sm">
                  h
                </span>
              </div>

              <input
                type="number"
                min="0"
                value="0"
                class="
                  w-full
                  bg-zinc-900
                  border
                  border-zinc-700
                  rounded-xl
                  p-3
                  outline-none
                "
              />

            </div>

            <div>

              <div class="flex justify-between mb-2">
                <span class="text-sm text-zinc-300">
                  Horas enfermedad
                </span>

                <span class="text-zinc-500 text-sm">
                  h
                </span>
              </div>

              <input
                type="number"
                min="0"
                value="0"
                class="
                  w-full
                  bg-zinc-900
                  border
                  border-zinc-700
                  rounded-xl
                  p-3
                  outline-none
                "
              />

            </div>

            <button
              class="
                feriadoBtn
                w-full
                border
                border-zinc-700
                rounded-xl
                p-3
                transition
              "
            >
              ⭐ Aplicar feriado pago (8h)
            </button>

          </div>
        `

        variablesSemana.appendChild(card)

      }

      const feriados =
        document.querySelectorAll(".feriadoBtn")

      feriados.forEach((btn) => {

        btn.addEventListener("click", () => {

          btn.classList.toggle("toggle-active")

          if (
            btn.innerText.includes("Aplicar")
          ) {

            btn.innerText =
              "⭐ Feriado pago aplicado"

          } else {

            btn.innerText =
              "⭐ Aplicar feriado pago (8h)"

          }

        })

      })

    }

    turnoSelect.addEventListener("change", () => {

      const turno =
        turnoSelect.value

      if (!turno) {

        variablesContainer.classList.add("hidden")

        return

      }

      variablesContainer.classList.remove("hidden")

      if (turno === "noche") {

        infoNocturna.classList.remove("hidden")

      } else {

        infoNocturna.classList.add("hidden")

      }

      renderSemana(turno)

    })

    const resultado =
      document.getElementById("resultado")

    document.addEventListener("click", (e) => {

      if (
        e.target &&
        e.target.id === "calcularBtn"
      ) {

        e.target.innerText =
          "Calculando..."

        setTimeout(() => {

          resultado.classList.remove("hidden")

          e.target.innerText =
            "Calcular"

        }, 900)

      }

    })

  </script>

</body>
</html>
